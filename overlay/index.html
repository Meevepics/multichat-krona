<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeve Chat Overlay — Krona</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --green: #00ff9d;
      --glow:  0 0 10px #00ff9d, 0 0 20px rgba(0,255,157,0.3);
      --glow-sm: 0 0 6px #00ff9d;
      --font-title: 'Creepster', cursive;
      --font-body:  'Special Elite', monospace;
      --ov-emote-size: 28px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: transparent; font-family: var(--font-body); overflow: hidden; min-height: 100vh; position: relative; }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle { position: absolute; width: 2px; height: 2px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: floatUp linear infinite; }
    @keyframes floatUp { 0%{ transform:translateY(100vh) translateX(0);opacity:0; } 10%{ opacity:0.8; } 90%{ opacity:0.6; } 100%{ transform:translateY(-80px) translateX(60px);opacity:0; } }

    .fog { position: fixed; inset: 0; pointer-events: none; z-index: 1; background: radial-gradient(ellipse at 50% 0%,rgba(0,255,157,0.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 100%,rgba(0,255,157,0.04) 0%,transparent 50%); animation: fogMove 15s ease-in-out infinite; }
    @keyframes fogMove { 0%,100%{opacity:0.4;transform:translateY(0);}50%{opacity:0.7;transform:translateY(-10px);} }

    #chat-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 720px; height: calc(100vh - 40px); overflow: hidden; padding: 0 20px; z-index: 10; display: flex; flex-direction: column; justify-content: flex-end; }

    #message-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    /* ── Bubble — igual al chat-uno pero más compacto verticalmente ── */
    .message-bubble {
      position: relative;
      width: 100%;
      opacity: 0;
      filter: drop-shadow(0 4px 16px rgba(0,255,157,0.2));
    }
    .bubble-inner {
      position: relative;
      background: rgba(0,15,15,0.75);
      border: 2px solid var(--green);
      border-radius: 6px;
      padding: 16px 20px;
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,157,0.03);
      overflow: hidden;
    }
    .bubble-inner::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(0,255,157,0.08),transparent); animation:specSweep 3s ease-in-out infinite; }
    @keyframes specSweep { 0%{left:-100%;}50%{left:100%;}100%{left:100%;} }

    .msg-progress { position:absolute; bottom:0; left:0; height:3px; background:var(--green); box-shadow:0 0 8px var(--green),0 0 16px rgba(0,255,157,0.4); width:100%; transform-origin:left; border-radius:0 0 0 6px; opacity:0.85; }

    /* Colores por plataforma */
    .bubble-inner.twitch  { border-color:#9146FF; box-shadow:0 0 15px rgba(145,70,255,0.3); }
    .bubble-inner.kick    { border-color:#53FC18; box-shadow:0 0 15px rgba(83,252,24,0.3); }
    .bubble-inner.tiktok  { border-color:#FF0050; box-shadow:0 0 15px rgba(255,0,80,0.3); }
    .bubble-inner.youtube { border-color:#FF0000; box-shadow:0 0 15px rgba(255,0,0,0.3); }
    .bubble-inner.custom  { border-color:#FF6B9D; box-shadow:0 0 15px rgba(255,107,157,0.3); }

    .bubble-inner > * { position: relative; z-index: 1; }

    .msg-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }

    /* Avatar igual al chat-uno */
    .avatar-box { width:52px; height:52px; border-radius:50%; border:3px solid var(--green); overflow:hidden; background:rgba(0,20,20,0.8); flex-shrink:0; box-shadow:0 0 15px rgba(0,255,157,0.4); }
    .avatar-box img { width:100%; height:100%; object-fit:cover; display:block; }
    .avatar-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(0,255,157,0.4); padding:10px; }

    .username-box { flex:1; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

    /* Username igual al chat-uno */
    .username { font-family:var(--font-title); font-size:24px; color:var(--green); text-shadow:var(--glow); letter-spacing:1px; }

    .platform-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; padding:2px 7px; border-radius:3px; font-weight:700; border:1px solid rgba(0,255,157,0.4); background:rgba(0,255,157,0.08); color:var(--green); }
    .platform-badge.twitch  { border-color:rgba(145,70,255,0.5);background:rgba(145,70,255,0.1);color:#9146FF; }
    .platform-badge.kick    { border-color:rgba(83,252,24,0.5); background:rgba(83,252,24,0.08);color:#53FC18; }
    .platform-badge.tiktok  { border-color:rgba(255,0,80,0.5);  background:rgba(255,0,80,0.08); color:#FF0050; }
    .platform-badge.youtube { border-color:rgba(255,0,0,0.5);   background:rgba(255,0,0,0.08);  color:#FF0000; }
    .platform-badge.custom  { border-color:rgba(255,107,157,0.5);background:rgba(255,107,157,0.08);color:#FF6B9D; }
    .platform-badge svg { width:11px; height:11px; flex-shrink:0; }

    .role-badge { font-size:9px; padding:2px 5px; border-radius:3px; font-weight:700; background:rgba(0,255,157,0.08); border:1px solid rgba(0,255,157,0.3); color:#5eead4; }
    .msg-badge { height:15px; width:auto; vertical-align:middle; filter:drop-shadow(0 0 4px var(--green)); }

    /* Texto del mensaje igual al chat-uno */
    .msg-content { color:#e0e0e0; font-size:20px; line-height:1.6; word-break:break-word; text-shadow:0 0 4px rgba(0,255,157,0.1); }
    .msg-content img.emote { height:var(--ov-emote-size,28px); width:auto; vertical-align:middle; margin:0 2px; image-rendering:-webkit-optimize-contrast; display:inline-block; }

    .donation-box { margin-top:10px; padding:8px 14px; background:rgba(0,255,157,0.1); border:2px solid var(--green); border-radius:3px; font-size:18px; font-weight:700; color:var(--green); text-align:center; text-shadow:var(--glow); }

    #conn-dot { position:fixed; top:10px; right:10px; width:8px; height:8px; border-radius:50%; background:#ef4444; box-shadow:0 0 6px #ef4444; z-index:999; transition:all 0.3s; }
    #conn-dot.ok { background:var(--green); box-shadow:0 0 8px var(--green); }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="fog"></div>
  <div id="conn-dot"></div>
  <div id="chat-container">
    <div id="message-list"></div>
  </div>

  <script>
    var urlParams    = new URLSearchParams(window.location.search);
    var SERVER_URL   = urlParams.get('server') || 'wss://localhost:3000';
    var MAX_MESSAGES = parseInt(urlParams.get('limit')) || 6;
    var AUTO_HIDE    = urlParams.get('autohide') === '1';
    var SHOW_TIME_MS = (parseInt(urlParams.get('showtime')) || 30) * 1000;

    (function(){
      var c=document.getElementById('particles');
      for(var i=0;i<20;i++){
        var p=document.createElement('div'); p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.animationDuration=(Math.random()*15+8)+'s';
        p.style.animationDelay=Math.random()*6+'s';
        var s=(Math.random()*3+1)+'px'; p.style.width=s; p.style.height=s;
        c.appendChild(p);
      }
    })();

    var PLATFORM_LOGOS = {
      twitch:  '<svg viewBox="0 0 24 28" fill="currentColor"><path d="M2.149 0L.537 4.119v19.63h6.72V28l4.123-4.25h3.29L22.463 14V0H2.149zm18.24 13.18l-3.29 3.387h-3.948l-2.886 2.973v-2.973H6.584V2.387h13.805v10.793zM17.07 5.367h-2.148v6.42h2.148V5.367zm-5.907 0h-2.15v6.42h2.15V5.367z"/></svg>',
      kick:    '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3h4v7l4.5-7H17L12 12l5.5 9H13L8.5 14v7H4V3z"/></svg>',
      tiktok:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.05a8.16 8.16 0 0 0 4.77 1.52V7.12a4.85 4.85 0 0 1-1-.43z"/></svg>',
      youtube: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>',
      custom:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
    };

    var messageList = document.getElementById('message-list');
    var connDot     = document.getElementById('conn-dot');

    // ── Deduplicación: evita mensajes dobles Pusher+Webhook ──────────────────
    var seenMids = new Set();
    var seenContent = {}; // chatname+content → timestamp

    function isDuplicate(data) {
      // Deduplicar por mid exacto
      var mid = data.mid || '';
      if (mid && seenMids.has(mid)) return true;
      if (mid) seenMids.add(mid);
      // Limpiar seenMids si crece mucho
      if (seenMids.size > 500) seenMids.clear();

      // Deduplicar por contenido idéntico en ventana de 3 segundos
      var key = (data.chatname || '') + '|' + (data.chatmessage || '');
      var now = Date.now();
      if (seenContent[key] && (now - seenContent[key]) < 3000) return true;
      seenContent[key] = now;

      return false;
    }
    // ─────────────────────────────────────────────────────────────────────────

    function esc(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function processTwitchEmotes(text, emotes) {
      if (!emotes || !emotes.length) return esc(text);
      var sorted = emotes.slice().sort(function(a,b){ return a.start - b.start; });
      var result = '', cursor = 0;
      for (var i = 0; i < sorted.length; i++) {
        var e = sorted[i];
        if (e.start > cursor) result += esc(text.slice(cursor, e.start));
        result += '<img class="emote" src="' + esc(e.url) + '" alt="' + esc(e.text) + '" onerror="this.style.display=\'none\'">';
        cursor = e.end + 1;
      }
      if (cursor < text.length) result += esc(text.slice(cursor));
      return result;
    }

    function parseKickEmotesFromText(text) {
      return esc(text).replace(/\[emote:(\d+):([^\]]+)\]/g, function(match, id, name) {
        return '<img class="emote" src="https://files.kick.com/emotes/' + id + '/fullsize" alt="' + name + '" onerror="this.style.display=\'none\'">';
      });
    }

    function processMessageHTML(data) {
      var text = data.chatmessage || '';
      var platform = data.platform || data.type || '';
      if (platform === 'twitch' && data.chatemotes && data.chatemotes.length > 0) return processTwitchEmotes(text, data.chatemotes);
      if (platform === 'kick') return parseKickEmotesFromText(text);
      return esc(text);
    }

    function addMessage(data) {
      if (!data.chatname && !data.chatmessage) return;
      if (isDuplicate(data)) return;

      var platform = data.platform || data.type || 'custom';
      var logo = PLATFORM_LOGOS[platform] || PLATFORM_LOGOS.custom;

      var msgDiv = document.createElement('div');
      msgDiv.className = 'message-bubble';

      var avatarHTML = data.chatimg
        ? '<div class="avatar-box"><img src="'+esc(data.chatimg)+'" onerror="this.style.display=\'none\'"></div>'
        : '<div class="avatar-box"><div class="avatar-fallback">'+logo+'</div></div>';

      var platBadge = '<span class="platform-badge '+platform+'"><span style="width:11px;height:11px;display:inline-flex;align-items:center;">'+logo+'</span>'+platform.charAt(0).toUpperCase()+platform.slice(1)+'</span>';

      var rolesHTML = '';
      if (data.roles && data.roles.length) data.roles.forEach(function(r){ rolesHTML += '<span class="role-badge">'+esc(r.label||r.type)+'</span>'; });

      var badgesHTML = '';
      if (data.chatbadges && data.chatbadges.length) data.chatbadges.forEach(function(b){
        if (typeof b==='string') badgesHTML += '<img class="msg-badge" src="'+esc(b)+'">';
        else if (b.src) badgesHTML += '<img class="msg-badge" src="'+esc(b.src)+'">';
      });

      var nameStyle = data.nameColor ? 'color:'+data.nameColor+';text-shadow:0 0 10px '+data.nameColor+';' : '';
      var msgHTML = processMessageHTML(data);

      var donHTML = '';
      if (data.type === 'donation' && data.amount) {
        var dl = data.donationType==='bits' ? '💎 '+data.amount+' Bits'
          : data.donationType==='sub'       ? '🌟 ¡Nuevo Sub!'
          : data.donationType==='resub'     ? '🔄 '+data.months+' meses'
          : data.donationType==='giftedsub' ? '🎁 Sub regalada'
          : data.donationType==='superchat' ? '💰 '+(data.amountDisplay||data.amount)
          : data.donationType==='member'    ? '⭐ ¡Nuevo Miembro!'
          : data.donationType==='gift'      ? '🎁 Regalo TikTok'
          : data.donationType==='redemption'? '🎯 '+esc(data.rewardTitle||'Canje')
          : '💰 '+data.amount;
        donHTML = '<div class="donation-box">'+dl+'</div>';
      }

      var progressBar = AUTO_HIDE ? '<div class="msg-progress"></div>' : '';

      msgDiv.innerHTML =
        '<div class="bubble-inner '+platform+'">' +
          '<div class="msg-header">'+avatarHTML+
            '<div class="username-box"><span class="username" style="'+nameStyle+'">'+esc(data.chatname||'')+'</span>'+platBadge+rolesHTML+badgesHTML+'</div>'+
          '</div>'+
          '<div class="msg-content">'+msgHTML+'</div>'+
          donHTML+progressBar+
        '</div>';

      messageList.appendChild(msgDiv);

      // Limitar cantidad de mensajes
      var bubbles = messageList.querySelectorAll('.message-bubble');
      if (bubbles.length > MAX_MESSAGES) {
        var old = bubbles[0];
        gsap.to(old, { opacity:0, x:-20, duration:0.3, onComplete:function(){ old.remove(); } });
      }

      // Animar entrada igual al chat-uno
      gsap.fromTo(msgDiv,
        { opacity:0, y:30, scale:0.92 },
        { opacity:1, y:0, scale:1, duration:0.55, ease:'back.out(1.8)',
          onComplete: function() {
            if (data.type === 'donation') {
              gsap.to(msgDiv.querySelector('.bubble-inner'), { boxShadow:'0 0 30px rgba(0,255,157,0.5)', yoyo:true, repeat:3, duration:0.4 });
            }
            if (AUTO_HIDE) {
              var bar = msgDiv.querySelector('.msg-progress');
              if (bar) gsap.to(bar, { scaleX:0, duration:SHOW_TIME_MS/1000, ease:'none' });
              setTimeout(function() {
                if (!msgDiv.parentNode) return;
                gsap.to(msgDiv, { opacity:0, y:-20, scale:0.9, duration:0.4, ease:'power2.in', onComplete:function(){ msgDiv.remove(); } });
              }, SHOW_TIME_MS);
            }
          }
        }
      );

      // Scroll al último mensaje
      requestAnimationFrame(function(){ messageList.lastElementChild && messageList.lastElementChild.scrollIntoView({ behavior:'smooth', block:'end' }); });
    }

    var ws, retryDelay = 1000;
    function connect() {
      try { ws = new WebSocket(SERVER_URL); } catch(e) { connDot.className=''; setTimeout(connect, retryDelay); return; }
      ws.onopen    = function(){ connDot.className='ok'; retryDelay=1000; };
      ws.onmessage = function(e){
        try {
          var d = JSON.parse(e.data);
          if (d.type==='status' || d.type==='highlight' || d.type==='highlight_clear') return;
          addMessage(d);
        } catch(err) {}
      };
      ws.onclose = function(){ connDot.className=''; retryDelay=Math.min(retryDelay*2,30000); setTimeout(connect,retryDelay); };
      ws.onerror = function(){ ws.close(); };
    }
    connect();
  </script>
</body>
</html>
