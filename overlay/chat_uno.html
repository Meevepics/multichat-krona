<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeve Chat — Un Mensaje — Krona</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --green:#00ff9d; --glow:0 0 10px #00ff9d,0 0 20px rgba(0,255,157,0.3); --glow-sm:0 0 6px #00ff9d;
      --font-title:'Creepster',cursive; --font-body:'Special Elite',monospace;
      --ov-emote-size: 28px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:transparent;font-family:var(--font-body);overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .particle{position:absolute;width:2px;height:2px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:floatUp linear infinite;}
    @keyframes floatUp{0%{transform:translateY(100vh) translateX(0);opacity:0;}10%{opacity:0.8;}90%{opacity:0.6;}100%{transform:translateY(-80px) translateX(60px);opacity:0;}}
    .fog{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at 50% 0%,rgba(0,255,157,0.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 100%,rgba(0,255,157,0.04) 0%,transparent 50%);animation:fogMove 15s ease-in-out infinite;}
    @keyframes fogMove{0%,100%{opacity:0.4;transform:translateY(0);}50%{opacity:0.7;transform:translateY(-10px);}}
    #chat-container{width:100%;max-width:720px;padding:0 20px;z-index:10;position:relative;}
    .message-bubble{position:relative;width:100%;opacity:0;filter:drop-shadow(0 4px 16px rgba(0,255,157,0.2));}
    .bubble-inner{position:relative;background:rgba(0,15,15,0.75);border:2px solid var(--green);border-radius:6px;padding:20px 24px;box-shadow:var(--glow),inset 0 0 30px rgba(0,255,157,0.03);overflow:hidden;}
    .bubble-inner::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,157,0.08),transparent);animation:specSweep 3s ease-in-out infinite;}
    @keyframes specSweep{0%{left:-100%;}50%{left:100%;}100%{left:100%;}}
    .msg-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--green);box-shadow:0 0 8px var(--green),0 0 16px rgba(0,255,157,0.4);width:100%;transform-origin:left;border-radius:0 0 0 6px;opacity:0.85;}
    .bubble-inner.twitch{border-color:#9146FF;box-shadow:0 0 15px rgba(145,70,255,0.3);}
    .bubble-inner.kick  {border-color:#53FC18;box-shadow:0 0 15px rgba(83,252,24,0.3);}
    .bubble-inner.tiktok{border-color:#FF0050;box-shadow:0 0 15px rgba(255,0,80,0.3);}
    .bubble-inner.youtube{border-color:#FF0000;box-shadow:0 0 15px rgba(255,0,0,0.3);}
    .bubble-inner.custom{border-color:#FF6B9D;box-shadow:0 0 15px rgba(255,107,157,0.3);}
    .bubble-inner>*{position:relative;z-index:1;}
    .msg-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
    .avatar-box{width:60px;height:60px;border-radius:50%;border:3px solid var(--green);overflow:hidden;background:rgba(0,20,20,0.8);flex-shrink:0;box-shadow:0 0 15px rgba(0,255,157,0.4);}
    .avatar-box img{width:100%;height:100%;object-fit:cover;display:block;}
    .avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(0,255,157,0.4);padding:12px;}
    .username-box{flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .username{font-family:var(--font-title);font-size:28px;color:var(--green);text-shadow:var(--glow);letter-spacing:1px;animation:textPop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes textPop{0%{transform:scale(0.7) rotate(-5deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
    .platform-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:3px;font-weight:700;border:1px solid rgba(0,255,157,0.4);background:rgba(0,255,157,0.08);color:var(--green);}
    .platform-badge.twitch{border-color:rgba(145,70,255,0.5);background:rgba(145,70,255,0.1);color:#9146FF;}
    .platform-badge.kick{border-color:rgba(83,252,24,0.5);background:rgba(83,252,24,0.08);color:#53FC18;}
    .platform-badge.tiktok{border-color:rgba(255,0,80,0.5);background:rgba(255,0,80,0.08);color:#FF0050;}
    .platform-badge.youtube{border-color:rgba(255,0,0,0.5);background:rgba(255,0,0,0.08);color:#FF0000;}
    .platform-badge.custom{border-color:rgba(255,107,157,0.5);background:rgba(255,107,157,0.08);color:#FF6B9D;}
    .platform-badge svg{width:12px;height:12px;flex-shrink:0;}
    .role-badge{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(0,255,157,0.08);border:1px solid rgba(0,255,157,0.3);color:#5eead4;font-weight:700;}
    .msg-badge{height:16px;width:auto;vertical-align:middle;filter:drop-shadow(0 0 4px var(--green));}
    .msg-content{color:#e0e0e0;font-size:22px;line-height:1.6;word-break:break-word;text-shadow:0 0 4px rgba(0,255,157,0.1);animation:contentAppear 0.5s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes contentAppear{0%{transform:scale(0.95);opacity:0;}100%{transform:scale(1);opacity:1;}}
    .msg-content img.emote{height:var(--ov-emote-size,28px);width:auto;vertical-align:middle;margin:0 2px;image-rendering:-webkit-optimize-contrast;display:inline-block;}
    .donation-box{margin-top:12px;padding:10px 16px;background:rgba(0,255,157,0.1);border:2px solid var(--green);border-radius:3px;font-size:20px;font-weight:700;color:var(--green);text-align:center;text-shadow:var(--glow);animation:donationPop 0.7s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes donationPop{0%{transform:scale(0.8);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
    #conn-dot{position:fixed;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px #ef4444;z-index:999;transition:all 0.3s;}
    #conn-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green);}

    /* ── EMOTE-ONLY MODE ─────────────────────────────────────────── */
    #emote-stage{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:50;
      overflow:hidden;
    }
    .emote-popup{
      position:absolute;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      pointer-events:none;
      will-change:transform,opacity;
    }
    .emote-popup .ep-name{
      font-family:var(--font-title);
      font-size:20px;
      color:var(--green);
      text-shadow:var(--glow);
      white-space:nowrap;
      background:rgba(0,10,10,0.65);
      padding:2px 10px;
      border-radius:4px;
      border:1px solid rgba(0,255,157,0.35);
    }
    .emote-popup .ep-img{
      width:96px;
      height:96px;
      object-fit:contain;
      image-rendering:-webkit-optimize-contrast;
      filter:drop-shadow(0 0 12px rgba(0,255,157,0.6));
    }
    @keyframes ep-shake{
      0%,100%{transform:rotate(0deg);}
      15%{transform:rotate(-12deg);}
      30%{transform:rotate(12deg);}
      45%{transform:rotate(-10deg);}
      60%{transform:rotate(10deg);}
      75%{transform:rotate(-6deg);}
      90%{transform:rotate(6deg);}
    }
    @keyframes ep-bounce{
      0%,100%{transform:translateY(0);}
      30%{transform:translateY(-28px);}
      60%{transform:translateY(-12px);}
      80%{transform:translateY(-20px);}
    }
    @keyframes ep-spin{
      0%{transform:rotate(0deg) scale(1);}
      50%{transform:rotate(180deg) scale(1.2);}
      100%{transform:rotate(360deg) scale(1);}
    }
    @keyframes ep-rubber{
      0%{transform:scale(1,1);}
      30%{transform:scale(1.4,0.7);}
      50%{transform:scale(0.75,1.25);}
      70%{transform:scale(1.2,0.85);}
      100%{transform:scale(1,1);}
    }
    @keyframes ep-wobble{
      0%,100%{transform:rotate(0deg) scale(1);}
      20%{transform:rotate(-15deg) scale(1.1);}
      40%{transform:rotate(10deg) scale(0.95);}
      60%{transform:rotate(-8deg) scale(1.05);}
      80%{transform:rotate(5deg) scale(1);}
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="fog"></div>
  <div id="conn-dot"></div>
  <div id="chat-container"></div>
  <div id="emote-stage"></div>

  <script>
    var urlParams  = new URLSearchParams(window.location.search);
    var SERVER_URL = urlParams.get('server') || 'wss://localhost:3000';

    var AUTO_HIDE    = urlParams.get('autohide') !== '0';
    var SHOW_TIME_MS = (parseInt(urlParams.get('showtime')) || 12) * 1000;

    (function(){
      var c=document.getElementById('particles');
      for(var i=0;i<15;i++){
        var p=document.createElement('div');p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.animationDuration=(Math.random()*12+8)+'s';
        p.style.animationDelay=Math.random()*5+'s';
        var s=(Math.random()*2+1)+'px';p.style.width=s;p.style.height=s;
        c.appendChild(p);
      }
    })();

    var PLATFORM_LOGOS={
      twitch:'<svg viewBox="0 0 24 28" fill="currentColor"><path d="M2.149 0L.537 4.119v19.63h6.72V28l4.123-4.25h3.29L22.463 14V0H2.149zm18.24 13.18l-3.29 3.387h-3.948l-2.886 2.973v-2.973H6.584V2.387h13.805v10.793zM17.07 5.367h-2.148v6.42h2.148V5.367zm-5.907 0h-2.15v6.42h2.15V5.367z"/></svg>',
      kick:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3h4v7l4.5-7H17L12 12l5.5 9H13L8.5 14v7H4V3z"/></svg>',
      tiktok:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.05a8.16 8.16 0 0 0 4.77 1.52V7.12a4.85 4.85 0 0 1-1-.43z"/></svg>',
      youtube:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>',
      custom:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
    };

    var chatContainer = document.getElementById('chat-container');
    var emoteStage    = document.getElementById('emote-stage');
    var connDot       = document.getElementById('conn-dot');

    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    function processTwitchEmotes(text,emotes){
      if(!emotes||!emotes.length) return esc(text);
      var sorted=emotes.slice().sort(function(a,b){return a.start-b.start;});
      var result='',cursor=0;
      for(var i=0;i<sorted.length;i++){
        var e=sorted[i];
        if(e.start>cursor) result+=esc(text.slice(cursor,e.start));
        result+='<img class="emote" src="'+esc(e.url)+'" alt="'+esc(e.text)+'" onerror="this.style.display=\'none\'">';
        cursor=e.end+1;
      }
      if(cursor<text.length) result+=esc(text.slice(cursor));
      return result;
    }

    function parseKickEmotesFromText(text){
      return esc(text).replace(/\[emote:(\d+):([^\]]+)\]/g,function(match,id,name){
        return '<img class="emote" src="https://files.kick.com/emotes/'+id+'/fullsize" alt="'+name+'" onerror="this.style.display=\'none\'">';
      });
    }

    function processMessageHTML(data){
      var text=data.chatmessage||'';
      var platform=data.platform||data.type||'';
      if(platform==='twitch'&&data.chatemotes&&data.chatemotes.length>0) return processTwitchEmotes(text,data.chatemotes);
      if(platform==='kick') return parseKickEmotesFromText(text);
      return esc(text);
    }

    /* ── Detect single-emote messages ───────────────────────────── */
    function detectSingleEmote(data) {
      var text = (data.chatmessage || '').trim();
      var platform = data.platform || data.type || '';

      // Twitch: un solo emote, sin texto extra
      if (platform === 'twitch' && data.chatemotes && data.chatemotes.length === 1) {
        var e = data.chatemotes[0];
        // verificar que el texto sea SOLO ese emote (nada antes/después)
        var before = text.slice(0, e.start).trim();
        var after  = text.slice(e.end + 1).trim();
        if (!before && !after) return { url: e.url, alt: e.text };
      }

      // Kick: [emote:ID:nombre] y nada más
      if (platform === 'kick') {
        var kickMatch = text.match(/^\[emote:(\d+):([^\]]+)\]$/);
        if (kickMatch) {
          return {
            url: 'https://files.kick.com/emotes/' + kickMatch[1] + '/fullsize',
            alt: kickMatch[2]
          };
        }
      }

      // Texto puro que sea solo un emoji unicode (fallback)
      if (/^\p{Emoji}$/u.test(text)) {
        return { url: null, alt: text, isEmoji: true };
      }

      return null;
    }

    /* ── Animaciones disponibles para el emote suelto ───────────── */
    var EMOTE_ANIMATIONS = [

      // 1. Sube desde abajo corriendo con balanceo lateral y cae de vuelta
      function animRunUp(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var startX = vw * 0.15 + Math.random() * vw * 0.6;
        el.style.left = startX + 'px';
        el.style.top  = (vh + 20) + 'px';
        gsap.set(el, { opacity:1, scaleX:1, scaleY:1.1 }); // estirado al salir corriendo
        var holdTime = Math.max(0.5, SHOW_TIME_MS/1000 - 3.5);
        var tl = gsap.timeline({ onComplete: onDone });
        // sube con squash al llegar
        tl.to(el, {
            y: -(vh * 0.55),
            scaleX:0.88, scaleY:1.18,   // se estira al subir rápido
            duration: 0.55,
            ease: 'power3.out'
          })
          // aterriza: squash horizontal
          .to(el, { scaleX:1.25, scaleY:0.78, duration:0.1, ease:'power2.out' })
          .to(el, { scaleX:0.92, scaleY:1.1,  duration:0.12, ease:'power2.inOut' })
          .to(el, { scaleX:1,    scaleY:1,    duration:0.15, ease:'elastic.out(1,0.4)' })
          // balanceo idle: se mece suavemente mientras espera
          .to(img, {
            rotation: 8, duration: 0.4, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 0.8) * 2
          })
          // anticipación: se agacha antes de saltar para irse
          .to(el, { scaleX:1.2, scaleY:0.75, y: '+=18', duration:0.18, ease:'power2.in' })
          // salta hacia abajo y sale por abajo de pantalla (se fue corriendo)
          .to(el, { y: vh * 0.6, scaleX:0.85, scaleY:1.2, opacity:0, duration:0.5, ease:'power3.in' })
          .to(img, { rotation:0, duration:0.1 }, '<');
      },

      // 2. Entra desde abajo izquierda, corre en arco balanceándose y sale por abajo derecha
      function animRunAcross(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        el.style.left = '-120px';
        el.style.top  = (vh * 0.45) + 'px';
        gsap.set(el, { opacity:1, scaleX:-1 }); // mirando hacia la derecha
        var tl = gsap.timeline({ onComplete: onDone });
        // el balanceo de carrera: rotación con cada "paso"
        var runDur = 2.0;
        tl.to(img, {
            keyframes:[
              { rotation:-12, duration: runDur/8 },
              { rotation: 12, duration: runDur/8 },
              { rotation:-12, duration: runDur/8 },
              { rotation: 12, duration: runDur/8 },
              { rotation:-12, duration: runDur/8 },
              { rotation: 12, duration: runDur/8 },
              { rotation:-12, duration: runDur/8 },
              { rotation: 12, duration: runDur/8 }
            ]
          })
          // la trayectoria: arco suave, baja un poco a media pantalla y sube al final
          .to(el, {
            x: vw + 200,
            keyframes:[
              { y: 0,         duration: runDur * 0.3, ease:'power1.in'  },
              { y: -vh*0.12,  duration: runDur * 0.4, ease:'sine.inOut' },
              { y: vh * 0.5,  duration: runDur * 0.3, ease:'power2.in' }
            ],
            duration: runDur,
            ease: 'none'
          }, '<')
          .to(el, { opacity:0, duration:0.3, ease:'power2.in' }, '-=0.35');
      },

      // 3. Sube desde abajo como globo, flota tranquilo y sube escapando
      function animBalloon(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var startX = vw * 0.2 + Math.random() * vw * 0.6;
        el.style.left = startX + 'px';
        el.style.top  = (vh + 20) + 'px';
        gsap.set(el, { opacity:0, scaleY:0.6, scaleX:1.3 }); // aplastado antes de inflarse
        var holdTime = Math.max(1, SHOW_TIME_MS/1000 - 2.8);
        var tl = gsap.timeline({ onComplete: onDone });
        tl.to(el, { opacity:1, scaleY:1.1, scaleX:0.92, duration:0.4, ease:'power2.out' }) // se infla
          .to(el, { scaleY:1, scaleX:1, duration:0.3, ease:'elastic.out(1.2,0.5)' })
          .to(el, { y: -(vh * 0.5), duration: 1.0, ease:'power2.out' })
          // drift lateral suave mientras flota
          .to(img, {
            x: 12, rotation:6, duration:0.9, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 1.8) * 2
          })
          .to(el, {
            y: '-=30', duration: holdTime * 0.5, ease:'sine.inOut',
            yoyo:true, repeat:1
          }, '<')
          // escapa flotando hacia arriba
          .to(el, { y: '-=' + (vh * 0.7), scaleX:0.85, scaleY:1.15, opacity:0, duration:0.8, ease:'power2.in' })
          .to(img, { rotation:0, x:0 }, '<');
      },

      // 4. Cae desde arriba con peso real: rebota varias veces achicándose
      function animDropHeavy(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var startX = vw * 0.15 + Math.random() * vw * 0.65;
        el.style.left  = startX + 'px';
        el.style.top   = '-130px';
        gsap.set(el, { opacity:1, scaleX:0.9, scaleY:1.2, rotation: -8 }); // estirado en caída
        var floorY = vh * 0.42;
        var holdTime = Math.max(0.5, SHOW_TIME_MS/1000 - 2.8);
        var tl = gsap.timeline({ onComplete: onDone });
        // caída
        tl.to(el, { y: floorY, rotation:5, duration:0.55, ease:'power2.in' })
          // primer bote: squash fuerte
          .to(el, { scaleX:1.45, scaleY:0.6,  duration:0.09, ease:'power2.out' })
          .to(el, { scaleX:0.88, scaleY:1.2,  duration:0.12, ease:'power2.out' })
          .to(el, { y: floorY - vh*0.12, scaleX:0.92, scaleY:1.1, rotation:-4, duration:0.28, ease:'power2.out' })
          // segundo bote: más chico
          .to(el, { y: floorY, scaleX:1.25, scaleY:0.78, duration:0.2, ease:'power2.in' })
          .to(el, { scaleX:0.95, scaleY:1.08, duration:0.1 })
          .to(el, { y: floorY - vh*0.04, duration:0.14, ease:'power2.out' })
          .to(el, { y: floorY, scaleX:1, scaleY:1, duration:0.12, ease:'power2.in' })
          // idle: respira suavemente
          .to(el, {
            scaleY:1.05, scaleX:0.97, duration:0.7, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 1.4) * 2
          })
          // se hunde hacia abajo y sale por la pantalla
          .to(el, { scaleX:1.15, scaleY:0.8, duration:0.15, ease:'power2.in' })
          .to(el, { y: floorY + vh * 0.7, scaleX:0.85, scaleY:1.2, opacity:0, duration:0.55, ease:'power3.in' });
      },

      // 5. Aparece con susto desde el centro, tiembla de miedo y sale disparado
      function animFright(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        el.style.left = (vw / 2 - 60) + 'px';
        el.style.top  = (vh * 0.38) + 'px';
        gsap.set(el, { opacity:0, scale:0, rotation:0 });
        var holdTime = Math.max(0.5, SHOW_TIME_MS/1000 - 2.5);
        var tl = gsap.timeline({ onComplete: onDone });
        // aparece con pop
        tl.to(el, { opacity:1, scale:1.35, duration:0.18, ease:'power3.out' })
          .to(el, { scale:0.9, duration:0.1 })
          .to(el, { scale:1.08, duration:0.08 })
          .to(el, { scale:1,   duration:0.1, ease:'elastic.out(1,0.4)' })
          // tiembla de miedo: vibración pequeña y orgánica
          .to(el, {
            keyframes:[
              {x:-9, y:-4, rotation:-5, duration:0.06},
              {x: 8, y: 3, rotation: 4, duration:0.06},
              {x:-7, y:-6, rotation:-3, duration:0.06},
              {x: 6, y: 2, rotation: 5, duration:0.06},
              {x:-5, y:-3, rotation:-2, duration:0.06},
              {x: 4, y: 1, rotation: 3, duration:0.06},
              {x:-3, y:-2, rotation:-1, duration:0.06},
              {x: 2, y: 0, rotation: 1, duration:0.06},
              {x: 0, y: 0, rotation: 0, duration:0.08}
            ]
          })
          // respira asustado (escala sutil)
          .to(el, {
            scale:1.04, duration:0.35, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 0.7) * 2
          })
          // sale disparado hacia arriba girando (huyó del susto)
          .to(el, { scale:0.7, y:10, duration:0.12, ease:'power2.in' })
          .to(el, { y: -(vh * 0.9), scale:1.4, rotation:-380, opacity:0, duration:0.55, ease:'power3.in' });
      },

      // 6. Sube bailando: rebota de izq a der con squash en cada piso
      function animDanceBounce(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var cx = vw * 0.3 + Math.random() * vw * 0.3;
        el.style.left = cx + 'px';
        el.style.top  = (vh + 20) + 'px';
        gsap.set(el, { opacity:1 });
        var floorY = vh * 0.48;
        var holdTime = Math.max(0, SHOW_TIME_MS/1000 - 4.2);
        var tl = gsap.timeline({ onComplete: onDone });

        function bounce(fromY, toY, xShift, rot, dur) {
          tl.to(el, { y: toY, x: '+='+xShift, rotation:rot,
                      scaleX:0.88, scaleY:1.18, duration:dur*0.55, ease:'power2.in' })
            .to(el, { scaleX:1.35, scaleY:0.65, duration:0.09 })
            .to(el, { scaleX:0.9, scaleY:1.12, duration:0.12 })
            .to(el, { scaleX:1, scaleY:1, duration:0.1 });
        }

        // sube de abajo al piso
        bounce(vh, floorY, 0, 8, 0.45);
        bounce(floorY, floorY - vh*0.18, 70, -10, 0.38);
        bounce(floorY - vh*0.18, floorY - vh*0.08, -50, 7, 0.32);
        bounce(floorY - vh*0.08, floorY - vh*0.22, 55, -8, 0.3);
        bounce(floorY - vh*0.22, floorY - vh*0.12, -45, 5, 0.28);

        // queda flotando con meneo
        tl.to(img, {
            rotation:12, duration:0.45, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 0.9) * 2
          })
          // salto final: sube y se va por arriba
          .to(el, { scaleX:1.2, scaleY:0.75, duration:0.15, ease:'power2.in' })
          .to(el, { y: -(vh * 0.8), scaleX:0.82, scaleY:1.25, opacity:0, duration:0.5, ease:'power2.in' })
          .to(img, { rotation:0, duration:0.3 }, '<');
      },

      // 7. Péndulo orgánico: cuelga desde arriba y suelta cuando para
      function animPendulum(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        el.style.left = (vw * 0.3 + Math.random() * vw * 0.35) + 'px';
        el.style.top  = '30px';
        gsap.set(el, { opacity:1, rotation:-55, transformOrigin:'50% -20px' });
        var holdTime = Math.max(0, SHOW_TIME_MS/1000 - 3.8);
        var tl = gsap.timeline({ onComplete: onDone });
        // oscilaciones que se van amortiguando naturalmente
        var swings = [55, -42, 32, -22, 15, -9, 5, -2, 0];
        var durations = [0.65, 0.60, 0.55, 0.50, 0.46, 0.42, 0.38, 0.34, 0.28];
        swings.forEach(function(r, i){
          tl.to(el, { rotation:r, duration:durations[i], ease:'sine.inOut' });
        });
        // idle: respira colgado
        tl.to(el, {
            scaleX:1.04, scaleY:0.97, duration:0.5, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 1.0) * 2
          })
          // suelta: cae con peso
          .to(el, { transformOrigin:'50% 50%', duration:0.01 })
          .to(el, { y: vh * 0.6, rotation:720, scaleX:0.82, scaleY:1.2, opacity:0, duration:0.7, ease:'power3.in' });
      },

      // 8. Pop desde abajo: sale como resorte, se estira al llegar y baja suave
      function animSpringPop(el, img, onDone) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var startX = vw * 0.2 + Math.random() * vw * 0.55;
        el.style.left = startX + 'px';
        el.style.top  = (vh + 20) + 'px';
        gsap.set(el, { opacity:0, scaleX:1.3, scaleY:0.5 }); // aplastado listo para disparar
        var peakY = vh * 0.2;
        var restY = vh * 0.38;
        var holdTime = Math.max(0.5, SHOW_TIME_MS/1000 - 2.6);
        var tl = gsap.timeline({ onComplete: onDone });
        tl.to(el, { opacity:1, duration:0.05 })
          // disparo hacia arriba: se estira
          .to(el, { y: -(vh - peakY), scaleX:0.78, scaleY:1.35, duration:0.38, ease:'power3.out' })
          // pico: squash al desacelerar en el aire
          .to(el, { scaleX:1.12, scaleY:0.88, duration:0.12, ease:'power2.out' })
          // cae suave al punto de reposo
          .to(el, { y: -(vh - restY), scaleX:0.92, scaleY:1.1, duration:0.35, ease:'power2.in' })
          // rebotecito al llegar
          .to(el, { scaleX:1.28, scaleY:0.72, duration:0.08 })
          .to(el, { scaleX:0.94, scaleY:1.08, duration:0.12 })
          .to(el, { scaleX:1, scaleY:1, duration:0.18, ease:'elastic.out(1,0.5)' })
          // idle: flota suavemente
          .to(el, {
            y: '-=15', duration:0.8, ease:'sine.inOut',
            yoyo:true, repeat: Math.ceil(holdTime / 1.6) * 2
          })
          // se hunde un poco (anticipación) y sale disparado hacia abajo
          .to(el, { scaleX:1.18, scaleY:0.75, y:'+=12', duration:0.14, ease:'power2.in' })
          .to(el, { y: vh * 0.5, scaleX:0.8, scaleY:1.3, opacity:0, duration:0.45, ease:'power3.in' });
      }
    ];

    /* ── Mostrar emote suelto ───────────────────────────────────── */
    function showEmoteOnly(data, emoteInfo) {
      var el = document.createElement('div');
      el.className = 'emote-popup';

      var nameEl = document.createElement('div');
      nameEl.className = 'ep-name';
      nameEl.textContent = data.chatname || '';

      var nameColor = data.nameColor || null;
      if (nameColor) {
        nameEl.style.color = nameColor;
        nameEl.style.textShadow = '0 0 10px ' + nameColor;
        nameEl.style.borderColor = nameColor + '80';
      }

      var mediaEl;
      if (emoteInfo.isEmoji) {
        mediaEl = document.createElement('div');
        mediaEl.className = 'ep-img';
        mediaEl.style.fontSize = '72px';
        mediaEl.style.lineHeight = '96px';
        mediaEl.style.textAlign = 'center';
        mediaEl.textContent = emoteInfo.alt;
      } else {
        mediaEl = document.createElement('img');
        mediaEl.className = 'ep-img';
        mediaEl.src = emoteInfo.url;
        mediaEl.alt = emoteInfo.alt;
        mediaEl.onerror = function(){ this.style.display='none'; };
      }

      el.appendChild(nameEl);
      el.appendChild(mediaEl);
      emoteStage.appendChild(el);

      // elegir animación aleatoria
      var anim = EMOTE_ANIMATIONS[Math.floor(Math.random() * EMOTE_ANIMATIONS.length)];

      var done = false;
      function onAnimDone() {
        if (done) return; done = true;
        if (el.parentNode) el.remove();
        processingMsg = false;
        drainPending();
      }

      anim(el, mediaEl, onAnimDone);

      // fallback: si la animación no llama onDone después de SHOW_TIME_MS+3s, limpiar igual
      setTimeout(function(){
        if (!done) {
          gsap.to(el, { opacity:0, duration:0.4, onComplete: onAnimDone });
        }
      }, SHOW_TIME_MS + 3000);
    }

    var processingMsg=false, pendingMsg=null, lastHash='';
    function msgHash(d){return(d.chatname||'')+'_'+(d.chatmessage||'')+'_'+(d.mid||'');}

    var hideTimer=null, hideProgressTween=null;
    function clearHideTimer(){
      if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
      if(hideProgressTween){hideProgressTween.kill();hideProgressTween=null;}
    }

    function scheduleHide(msgDiv){
      if(!AUTO_HIDE){
        processingMsg=false;
        drainPending();
        return;
      }
      clearHideTimer();
      var bar=msgDiv.querySelector('.msg-progress');
      if(bar){
        hideProgressTween=gsap.to(bar,{scaleX:0,duration:SHOW_TIME_MS/1000,ease:'none'});
      }
      hideTimer=setTimeout(function(){
        if(!msgDiv.parentNode){processingMsg=false;drainPending();return;}
        gsap.to(msgDiv,{
          opacity:0,y:-30,scale:0.9,
          duration:0.4,ease:'power2.in',
          onComplete:function(){
            if(msgDiv.parentNode) msgDiv.remove();
            processingMsg=false;
            drainPending();
          }
        });
      }, SHOW_TIME_MS);
    }

    function drainPending(){
      if(pendingMsg){var n=pendingMsg;pendingMsg=null;setTimeout(function(){showMessage(n);},100);}
    }

    function addMessage(data) {
      if (!data.chatname&&!data.chatmessage) return;
      var h=msgHash(data);
      if(h===lastHash) return; lastHash=h;
      if(processingMsg){pendingMsg=data;return;}
      showMessage(data);
    }

    function showMessage(data) {
      processingMsg=true;
      clearHideTimer();

      // ¿es un solo emote?
      var emoteInfo = detectSingleEmote(data);
      if (emoteInfo) {
        // remover bubble anterior si existe
        var old = chatContainer.querySelector('.message-bubble');
        if (old) { gsap.to(old,{opacity:0,duration:0.2,onComplete:function(){old.remove();}}); }
        showEmoteOnly(data, emoteInfo);
        return;
      }

      var old=chatContainer.querySelector('.message-bubble');
      if (old) {
        gsap.to(old,{opacity:0,y:-30,scale:0.85,duration:0.3,onComplete:function(){old.remove();render(data);}});
      } else { render(data); }
    }

    function render(data) {
      var platform=data.platform||data.type||'custom';
      var logo=PLATFORM_LOGOS[platform]||PLATFORM_LOGOS.custom;
      var msgDiv=document.createElement('div');
      msgDiv.className='message-bubble';

      var avatarHTML=data.chatimg
        ?'<div class="avatar-box"><img src="'+esc(data.chatimg)+'" onerror="this.style.display=\'none\'"></div>'
        :'<div class="avatar-box"><div class="avatar-fallback">'+logo+'</div></div>';

      var platBadge='<span class="platform-badge '+platform+'" style="display:inline-flex;align-items:center;gap:3px;"><span style="width:12px;height:12px;display:inline-flex;">'+logo+'</span>'+platform.charAt(0).toUpperCase()+platform.slice(1)+'</span>';
      var rolesHTML='';
      if(data.roles&&data.roles.length) data.roles.forEach(function(r){rolesHTML+='<span class="role-badge">'+esc(r.label||r.type)+'</span>';});
      var badgesHTML='';
      if(data.chatbadges&&data.chatbadges.length) data.chatbadges.forEach(function(b){
        if(typeof b==='string') badgesHTML+='<img class="msg-badge" src="'+esc(b)+'">';
        else if(b.src) badgesHTML+='<img class="msg-badge" src="'+esc(b.src)+'">';
      });
      var nameStyle=data.nameColor?'color:'+data.nameColor+';text-shadow:0 0 10px '+data.nameColor+';':'';
      var isDonation=data.type==='donation';
      var msgHTML=processMessageHTML(data);

      var donHTML='';
      if(isDonation&&data.amount){
        var dl=data.donationType==='bits'?'💎 '+data.amount+' Bits':data.donationType==='sub'?'🌟 ¡Nuevo Sub!':data.donationType==='resub'?'🔄 '+data.months+' meses':data.donationType==='subgift'?'🎁 Sub regalada':data.donationType==='superchat'?'💰 '+(data.amountDisplay||data.amount):data.donationType==='member'?'⭐ ¡Nuevo Miembro!':data.donationType==='gift'?'🎁 Regalo TikTok':'💰 '+data.amount;
        donHTML='<div class="donation-box">'+dl+'</div>';
      }

      var progressBar = AUTO_HIDE ? '<div class="msg-progress"></div>' : '';

      msgDiv.innerHTML='<div class="bubble-inner '+platform+'"><div class="msg-header">'+avatarHTML+'<div class="username-box"><span class="username" style="'+nameStyle+'">'+esc(data.chatname||'')+'</span>'+platBadge+rolesHTML+badgesHTML+'</div></div><div class="msg-content">'+msgHTML+'</div>'+donHTML+progressBar+'</div>';

      chatContainer.appendChild(msgDiv);
      gsap.fromTo(msgDiv,
        {opacity:0,y:50,scale:0.85,rotation:-2},
        {opacity:1,y:0,scale:1,rotation:0,duration:0.7,ease:'back.out(2)',
          onComplete:function(){
            if(isDonation){ gsap.to(msgDiv.querySelector('.bubble-inner'),{boxShadow:'0 0 30px rgba(0,255,157,0.5)',yoyo:true,repeat:3,duration:0.4}); }
            scheduleHide(msgDiv);
          }
        }
      );
    }

    var ws, retryDelay=1000;
    function connect(){
      try{ws=new WebSocket(SERVER_URL);}catch(e){connDot.className='';setTimeout(connect,retryDelay);return;}
      ws.onopen=function(){connDot.className='ok';retryDelay=1000;};
      ws.onmessage=function(e){
        try{
          var d=JSON.parse(e.data);
          if(d.type==='status'||d.type==='highlight'||d.type==='highlight_clear')return;
          addMessage(d);
        }catch(err){}
      };
      ws.onclose=function(){connDot.className='';retryDelay=Math.min(retryDelay*2,30000);setTimeout(connect,retryDelay);};
      ws.onerror=function(){ws.close();};
    }
    connect();
  </script>
