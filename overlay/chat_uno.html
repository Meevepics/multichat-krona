<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeve Chat — Un Mensaje — Krona</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --green:    #00ff9d;
      --glow:     0 0 10px #00ff9d, 0 0 20px rgba(0,255,157,0.3);
      --glow-sm:  0 0 6px #00ff9d;
      --font-title: 'Creepster', cursive;
      --font-body:  'Special Elite', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: transparent;
      font-family: var(--font-body);
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Partículas */
    .particles { position:fixed;inset:0;pointer-events:none;z-index:0; }
    .particle { position:absolute;width:2px;height:2px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:floatUp linear infinite; }
    @keyframes floatUp {
      0%  { transform:translateY(100vh) translateX(0);opacity:0; }
      10% { opacity:0.8; }
      90% { opacity:0.6; }
      100%{ transform:translateY(-80px) translateX(60px);opacity:0; }
    }

    /* Niebla */
    .fog {
      position:fixed;inset:0;pointer-events:none;z-index:1;
      background: radial-gradient(ellipse at 50% 0%,rgba(0,255,157,0.04) 0%,transparent 50%),
                  radial-gradient(ellipse at 50% 100%,rgba(0,255,157,0.04) 0%,transparent 50%);
      animation:fogMove 15s ease-in-out infinite;
    }
    @keyframes fogMove { 0%,100%{opacity:0.4;transform:translateY(0);}50%{opacity:0.7;transform:translateY(-10px);} }

    /* Contenedor */
    #chat-container {
      width: 100%; max-width: 720px;
      padding: 0 20px;
      z-index: 10; position: relative;
    }

    /* Burbuja */
    .message-bubble {
      position: relative;
      width: 100%;
      opacity: 0;
      filter: drop-shadow(0 4px 16px rgba(0,255,157,0.2));
    }

    .bubble-inner {
      position: relative;
      background: rgba(0,15,15,0.75);
      border: 2px solid var(--green);
      border-radius: 6px;
      padding: 20px 24px;
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,157,0.03);
      overflow: hidden;
    }

    /* Barrido espectral */
    .bubble-inner::before {
      content:'';
      position:absolute;top:0;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(0,255,157,0.08),transparent);
      animation:specSweep 3s ease-in-out infinite;
    }
    @keyframes specSweep { 0%{left:-100%;}50%{left:100%;}100%{left:100%;} }

    /* Colores borde por plataforma */
    .bubble-inner.twitch  { border-color:#9146FF; box-shadow:0 0 15px rgba(145,70,255,0.3); }
    .bubble-inner.kick    { border-color:#53FC18; box-shadow:0 0 15px rgba(83,252,24,0.3); }
    .bubble-inner.tiktok  { border-color:#FF0050; box-shadow:0 0 15px rgba(255,0,80,0.3); }
    .bubble-inner.youtube { border-color:#FF0000; box-shadow:0 0 15px rgba(255,0,0,0.3); }
    .bubble-inner.custom  { border-color:#FF6B9D; box-shadow:0 0 15px rgba(255,107,157,0.3); }

    .bubble-inner > * { position:relative; z-index:1; }

    /* Header */
    .msg-header {
      display:flex; align-items:center;
      gap:14px; margin-bottom:14px;
    }

    .avatar-box {
      width:60px; height:60px;
      border-radius:50%;
      border:3px solid var(--green);
      overflow:hidden;
      background:rgba(0,20,20,0.8);
      flex-shrink:0;
      box-shadow:0 0 15px rgba(0,255,157,0.4);
    }
    .avatar-box img { width:100%;height:100%;object-fit:cover;display:block; }
    .avatar-fallback { width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(0,255,157,0.4);padding:12px; }

    .username-box {
      flex:1; display:flex; align-items:center;
      gap:8px; flex-wrap:wrap;
    }

    .username {
      font-family:var(--font-title);
      font-size:28px;
      color:var(--green);
      text-shadow:var(--glow);
      letter-spacing:1px;
      animation:textPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes textPop { 0%{transform:scale(0.7) rotate(-5deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;} }

    .platform-badge {
      display:inline-flex;align-items:center;gap:4px;
      font-size:11px;padding:3px 8px;
      border-radius:3px;font-weight:700;
      border:1px solid rgba(0,255,157,0.4);
      background:rgba(0,255,157,0.08);
      color:var(--green);
    }
    .platform-badge.twitch  { border-color:rgba(145,70,255,0.5);background:rgba(145,70,255,0.1);color:#9146FF; }
    .platform-badge.kick    { border-color:rgba(83,252,24,0.5); background:rgba(83,252,24,0.08);color:#53FC18; }
    .platform-badge.tiktok  { border-color:rgba(255,0,80,0.5);  background:rgba(255,0,80,0.08); color:#FF0050; }
    .platform-badge.youtube { border-color:rgba(255,0,0,0.5);   background:rgba(255,0,0,0.08);  color:#FF0000; }
    .platform-badge.custom  { border-color:rgba(255,107,157,0.5);background:rgba(255,107,157,0.08);color:#FF6B9D; }
    .platform-badge svg { width:12px;height:12px;flex-shrink:0; }

    .role-badge { font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(0,255,157,0.08);border:1px solid rgba(0,255,157,0.3);color:#5eead4;font-weight:700; }
    .msg-badge  { height:16px;width:auto;vertical-align:middle;filter:drop-shadow(0 0 4px var(--green)); }

    /* Contenido */
    .msg-content {
      color:#e0e0e0;
      font-size:22px;
      line-height:1.6;
      word-break:break-word;
      text-shadow:0 0 4px rgba(0,255,157,0.1);
      animation:contentAppear 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes contentAppear { 0%{transform:scale(0.95);opacity:0;}100%{transform:scale(1);opacity:1;} }

    /* EMOTES */
    .msg-content img.emote { height:28px;width:auto;vertical-align:middle;margin:0 2px;image-rendering:-webkit-optimize-contrast; }

    /* Donación */
    .donation-box {
      margin-top:12px;
      padding:10px 16px;
      background:rgba(0,255,157,0.1);
      border:2px solid var(--green);
      border-radius:3px;
      font-size:20px;font-weight:700;
      color:var(--green);text-align:center;
      text-shadow:var(--glow);
      box-shadow:0 0 20px rgba(0,255,157,0.25);
      animation:donationPop 0.7s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes donationPop { 0%{transform:scale(0.8);}50%{transform:scale(1.05);}100%{transform:scale(1);} }

    /* Indicador conexión */
    #conn-dot { position:fixed;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px #ef4444;z-index:999;transition:all 0.3s; }
    #conn-dot.ok { background:var(--green);box-shadow:0 0 8px var(--green); }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="fog"></div>
  <div id="conn-dot"></div>
  <div id="chat-container"></div>

  <script>
    var urlParams  = new URLSearchParams(window.location.search);
    var SERVER_URL = urlParams.get('server') || 'wss://localhost:3000';

    // Partículas
    (function(){
      var c=document.getElementById('particles');
      for(var i=0;i<15;i++){
        var p=document.createElement('div');p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.animationDuration=(Math.random()*12+8)+'s';
        p.style.animationDelay=Math.random()*5+'s';
        var s=(Math.random()*2+1)+'px';p.style.width=s;p.style.height=s;
        c.appendChild(p);
      }
    })();

    var PLATFORM_LOGOS={
      twitch:  '<svg viewBox="0 0 24 28" fill="currentColor"><path d="M2.149 0L.537 4.119v19.63h6.72V28l4.123-4.25h3.29L22.463 14V0H2.149zm18.24 13.18l-3.29 3.387h-3.948l-2.886 2.973v-2.973H6.584V2.387h13.805v10.793zM17.07 5.367h-2.148v6.42h2.148V5.367zm-5.907 0h-2.15v6.42h2.15V5.367z"/></svg>',
      kick:    '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3h4v7l4.5-7H17L12 12l5.5 9H13L8.5 14v7H4V3z"/></svg>',
      tiktok:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.05a8.16 8.16 0 0 0 4.77 1.52V7.12a4.85 4.85 0 0 1-1-.43z"/></svg>',
      youtube: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>',
      custom:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
    };

    var chatContainer = document.getElementById('chat-container');
    var connDot = document.getElementById('conn-dot');

    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    function processEmotes(text, emotes) {
      if (!emotes||!emotes.length) return esc(text);
      var r=esc(text);
      emotes.forEach(function(e){
        if(e.text&&e.url){
          var rx=e.text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          r=r.replace(new RegExp(rx,'g'),'<img class="emote" src="'+esc(e.url)+'" alt="'+esc(e.text)+'" title="'+esc(e.text)+'">');
        }
      });
      return r;
    }

    var processingMsg=false, pendingMsg=null, lastHash='';
    function msgHash(d){return(d.chatname||'')+'_'+(d.chatmessage||'')+'_'+(d.mid||'');}

    function addMessage(data) {
      if (!data.chatname&&!data.chatmessage) return;
      var h=msgHash(data);
      if(h===lastHash) return; lastHash=h;
      if(processingMsg){pendingMsg=data;return;}
      showMessage(data);
    }

    function showMessage(data) {
      processingMsg=true;
      var old=chatContainer.querySelector('.message-bubble');
      if (old) {
        gsap.to(old,{opacity:0,y:-30,scale:0.85,duration:0.3,onComplete:function(){old.remove();render(data);}});
      } else { render(data); }
    }

    function render(data) {
      var platform=data.platform||data.type||'custom';
      var logo=PLATFORM_LOGOS[platform]||PLATFORM_LOGOS.custom;

      var msgDiv=document.createElement('div');
      msgDiv.className='message-bubble';

      var avatarHTML=data.chatimg
        ?'<div class="avatar-box"><img src="'+esc(data.chatimg)+'" onerror="this.style.display=\'none\'"></div>'
        :'<div class="avatar-box"><div class="avatar-fallback">'+logo+'</div></div>';

      var platBadge='<span class="platform-badge '+platform+'" style="display:inline-flex;align-items:center;gap:3px;"><span style="width:12px;height:12px;display:inline-flex;">'+logo+'</span>'+platform.charAt(0).toUpperCase()+platform.slice(1)+'</span>';

      var rolesHTML='';
      if(data.roles&&data.roles.length) data.roles.forEach(function(r){rolesHTML+='<span class="role-badge">'+esc(r.label||r.type)+'</span>';});

      var badgesHTML='';
      if(data.chatbadges&&data.chatbadges.length) data.chatbadges.forEach(function(b){
        if(typeof b==='string') badgesHTML+='<img class="msg-badge" src="'+esc(b)+'">';
        else if(b.src) badgesHTML+='<img class="msg-badge" src="'+esc(b.src)+'">';
      });

      var nameStyle=data.nameColor?'color:'+data.nameColor+';text-shadow:0 0 10px '+data.nameColor+';':'';
      var isDonation=data.type==='donation';
      var msgHTML=processEmotes(data.chatmessage||'',data.chatemotes);

      var donHTML='';
      if(isDonation&&data.amount){
        var dl=data.donationType==='bits'?'💎 '+data.amount+' Bits'
              :data.donationType==='sub'?'🌟 ¡Nuevo Sub!'
              :data.donationType==='resub'?'🔄 '+data.months+' meses'
              :data.donationType==='subgift'?'🎁 Sub regalada'
              :data.donationType==='superchat'?'💰 '+(data.amountDisplay||data.amount)
              :data.donationType==='member'?'⭐ ¡Nuevo Miembro!'
              :data.donationType==='gift'?'🎁 Regalo TikTok':'💰 '+data.amount;
        donHTML='<div class="donation-box">'+dl+'</div>';
      }

      msgDiv.innerHTML='<div class="bubble-inner '+platform+'">'+
        '<div class="msg-header">'+avatarHTML+
          '<div class="username-box"><span class="username" style="'+nameStyle+'">'+esc(data.chatname||'')+'</span>'+platBadge+rolesHTML+badgesHTML+'</div>'+
        '</div>'+
        '<div class="msg-content">'+msgHTML+'</div>'+
        donHTML+
        '</div>';

      chatContainer.appendChild(msgDiv);

      gsap.fromTo(msgDiv,
        {opacity:0,y:50,scale:0.85,rotation:-2},
        {opacity:1,y:0,scale:1,rotation:0,duration:0.7,ease:'back.out(2)',
          onComplete:function(){
            if(isDonation){
              gsap.to(msgDiv.querySelector('.bubble-inner'),{boxShadow:'0 0 30px rgba(0,255,157,0.5)',yoyo:true,repeat:3,duration:0.4});
            }
            processingMsg=false;
            if(pendingMsg){var n=pendingMsg;pendingMsg=null;setTimeout(function(){showMessage(n);},100);}
          }
        }
      );
    }

    var ws, retryDelay=1000;
    function connect(){
      try{ws=new WebSocket(SERVER_URL);}catch(e){connDot.className='';setTimeout(connect,retryDelay);return;}
      ws.onopen=function(){connDot.className='ok';retryDelay=1000;};
      ws.onmessage=function(e){
        try{var d=JSON.parse(e.data);if(d.type==='status'||d.type==='highlight'||d.type==='highlight_clear')return;addMessage(d);}catch(err){}
      };
      ws.onclose=function(){connDot.className='';retryDelay=Math.min(retryDelay*2,30000);setTimeout(connect,retryDelay);};
      ws.onerror=function(){ws.close();};
    }
    connect();
  </script>
</body>
</html>
