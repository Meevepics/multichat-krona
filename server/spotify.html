<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio Musical del Abismo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=UnifrakturMaguntia&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Special Elite', monospace;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px 20px;
            overflow: hidden;
        }

        .eldritch-eye {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            background: radial-gradient(circle, #001a0a 0%, #004d28 30%, #00cc66 55%, #007040 75%, #003320 100%);
            border-radius: 50%;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 25px rgba(0,255,157,0.7), 0 0 50px rgba(0,255,157,0.3), inset 0 0 15px rgba(0,255,157,0.2);
            animation: eyeBlink 6s ease-in-out infinite;
            z-index: 25;
            overflow: hidden;
        }
        .eldritch-eye::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 32px;
            background: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(0,0,0,0.8);
            animation: pupilMove 8s ease-in-out infinite;
            z-index: 3;
        }
        .eldritch-eye::after {
            content: '';
            position: absolute;
            top: 18%; left: 28%;
            width: 8px; height: 8px;
            background: rgba(255,255,255,0.35);
            border-radius: 50%;
            animation: reflectMove 8s ease-in-out infinite;
            z-index: 4;
        }
        @keyframes eyeBlink {
            0%, 90%, 100% { transform: translateX(-50%) scaleY(1); }
            94%            { transform: translateX(-50%) scaleY(0.06); }
            96%            { transform: translateX(-50%) scaleY(0.15); }
        }
        @keyframes pupilMove {
            0%,  8%   { transform: translate(-50%,-50%); width:10px; height:32px; }
            12%, 20%  { transform: translate(-68%,-50%); width:8px;  height:30px; }
            24%, 34%  { transform: translate(-32%,-50%); width:8px;  height:30px; }
            38%, 46%  { transform: translate(-50%,-65%); width:9px;  height:28px; }
            50%, 58%  { transform: translate(-50%,-35%); width:9px;  height:28px; }
            62%, 70%  { transform: translate(-65%,-60%); width:7px;  height:26px; }
            74%, 82%  { transform: translate(-35%,-40%); width:7px;  height:26px; }
            86%, 100% { transform: translate(-50%,-50%); width:10px; height:32px; }
        }
        @keyframes reflectMove {
            0%,  8%   { top:18%; left:28%; }
            12%, 20%  { top:18%; left:15%; }
            24%, 34%  { top:18%; left:42%; }
            38%, 46%  { top:10%; left:28%; }
            50%, 58%  { top:26%; left:28%; }
            62%, 70%  { top:12%; left:18%; }
            74%, 82%  { top:22%; left:38%; }
            86%, 100% { top:18%; left:28%; }
        }

        .grimoire-widget {
            position: relative;
            background: linear-gradient(135deg, rgba(5,15,15,0.98) 0%, rgba(0,25,25,0.95) 100%);
            border: 2px solid #00ff9d;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0,255,157,0.3), inset 0 0 50px rgba(0,0,0,0.7);
            padding: 0;
            max-width: 480px;
            width: 100%;
            transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            overflow: visible;
        }
        .grimoire-widget::before {
            content: '';
            position: absolute;
            top:-2px; left:-2px; right:-2px; bottom:-2px;
            background: linear-gradient(45deg, #00ff9d, transparent, #00ff9d);
            opacity: 0.1;
            animation: borderPulse 4s ease-in-out infinite;
            z-index: -1;
            border-radius: 4px;
        }
        @keyframes borderPulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .grimoire-widget.hidden-state {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }

        .corner-glyph {
            position: absolute;
            width: 16px; height: 16px;
            color: #00ff9d;
            font-size: 14px;
            text-shadow: 0 0 12px #00ff9d;
            opacity: 0.7;
            animation: glyphPulse 3s ease-in-out infinite;
            z-index: 15;
        }
        .corner-glyph.tl { top:4px; left:4px; }
        .corner-glyph.tr { top:4px; right:4px; }
        .corner-glyph.bl { bottom:4px; left:4px; }
        .corner-glyph.br { bottom:4px; right:4px; }
        @keyframes glyphPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .grimoire-header {
            background: linear-gradient(90deg, rgba(0,255,157,0.15) 0%, rgba(0,255,157,0.05) 100%);
            border-bottom: 1px solid rgba(0,255,157,0.5);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grimoire-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 0.8rem;
            color: #00ff9d;
            text-shadow: 0 0 12px rgba(0,255,157,0.6);
            letter-spacing: 1.5px;
            margin: 0;
        }
        .status-indicator {
            font-size: 0.55rem;
            color: #00ff9d;
            padding: 2px 8px;
            border: 1px solid rgba(0,255,157,0.5);
            border-radius: 2px;
            text-shadow: 0 0 8px rgba(0,255,157,0.4);
            letter-spacing: 1px;
            background: rgba(0,255,157,0.05);
        }

        .grimoire-content {
            padding: 10px 12px;
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: center;
        }

        .album-portal {
            position: relative;
            width: 70px; min-width: 70px; height: 70px;
            flex-shrink: 0;
        }
        .portal-rings {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(0,255,157,0.4);
        }
        .ring-1 { width:70px; height:70px; animation: ringRotate 20s linear infinite; border-style: dashed; }
        .ring-2 { width:56px; height:56px; animation: ringRotate 15s linear infinite reverse; opacity: 0.6; }
        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .album-art-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 62px; height: 62px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 20px rgba(0,255,157,0.5), inset 0 0 20px rgba(0,0,0,0.5);
            background: rgba(0,20,20,0.9);
        }
        .album-art-container img { width:100%; height:100%; object-fit:cover; }
        .album-art-container.spinning {
            animation: artSpin 12s linear infinite;
        }
        @keyframes artSpin {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to   { transform: translate(-50%,-50%) rotate(360deg); }
        }

        .orbit-particles { position:absolute; inset:0; pointer-events:none; }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: #00ff9d;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ff9d;
            animation: orbitPath 8s linear infinite;
            left: 50%; top: 50%;
        }
        @keyframes orbitPath {
            from { transform: rotate(0deg) translateX(35px) rotate(0deg); opacity:0; }
            10%, 90% { opacity: 1; }
            to   { transform: rotate(360deg) translateX(35px) rotate(-360deg); opacity:0; }
        }

        .track-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
            overflow: hidden;
        }
        .track-details {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 8px;
            background: rgba(0,255,157,0.03);
            border: 1px solid rgba(0,255,157,0.2);
            border-radius: 3px;
            position: relative;
            overflow: visible;
        }
        .track-details::before {
            content: '';
            position: absolute;
            top: -8px; left: 50%;
            transform: translateX(-50%);
            width: 16px; height: 16px;
            background: linear-gradient(135deg, rgba(5,15,15,0.98) 0%, rgba(0,25,25,0.95) 100%);
            border-radius: 50%;
            border: 1px solid rgba(0,255,157,0.4);
            box-shadow: 0 0 8px rgba(0,255,157,0.2);
            z-index: 4;
        }
        .track-details::after {
            content: '♪';
            position: absolute;
            top: -5px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #00ff9d;
            text-shadow: 0 0 10px #00ff9d;
            z-index: 5;
            line-height: 1;
        }
        .track-name {
            color: #00ff9d;
            font-size: 0.85rem;
            text-shadow: 0 0 10px rgba(0,255,157,0.5);
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .track-artist {
            color: #7fffd4;
            font-size: 0.7rem;
            text-shadow: 0 0 6px rgba(127,255,212,0.3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-style: italic;
        }
        .track-album {
            color: #4dffb8;
            font-size: 0.65rem;
            text-shadow: 0 0 4px rgba(77,255,184,0.2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0.8;
        }

        .progress-section {
            background: rgba(0,20,20,0.6);
            border: 1px solid rgba(0,255,157,0.25);
            border-radius: 3px;
            padding: 6px 8px;
        }
        .progress-bar-container {
            position: relative;
            height: 4px;
            background: rgba(0,40,40,0.8);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff9d 0%, #00ffcc 100%);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 12px rgba(0,255,157,0.6);
            position: relative;
        }
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: 0; top: 0;
            width: 3px; height: 100%;
            background: #fff;
            box-shadow: 0 0 8px #00ff9d;
            animation: progressPulse 1s ease-in-out infinite;
        }
        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .progress-times {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
        }

        .sr-only {
            position:absolute; width:1px; height:1px;
            padding:0; margin:-1px; overflow:hidden;
            clip:rect(0,0,0,0); white-space:nowrap; border:0;
        }
    </style>
</head>
<body>
    <div class="grimoire-widget hidden-state" id="overlay">
        <div class="eldritch-eye"></div>
        <div class="corner-glyph tl">⛧</div>
        <div class="corner-glyph tr">⛥</div>
        <div class="corner-glyph bl">☽</div>
        <div class="corner-glyph br">☾</div>

        <div class="grimoire-header">
            <h1 class="grimoire-title">Grimorio Musical</h1>
            <span class="status-indicator" id="status">INACTIVO</span>
        </div>

        <div class="grimoire-content">
            <div class="album-portal">
                <div class="portal-rings">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                </div>
                <div class="album-art-container" id="artContainer">
                    <img id="art" alt="Carátula del álbum" src="">
                </div>
                <div class="orbit-particles" id="particles"></div>
            </div>

            <div class="track-info">
                <div class="track-details">
                    <div class="track-name" id="title">Aguardando invocación...</div>
                    <div class="track-artist" id="artist">—</div>
                    <div class="track-album" id="album">—</div>
                </div>
                <div class="progress-section" id="progressSection">
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-times">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <span class="sr-only" id="ariaStatus" aria-live="polite"></span>

    <script>
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.animationDelay = (i * 1.33) + 's';
                container.appendChild(p);
            }
        })();

        const POLL_INTERVAL = 5000;

        const overlayEl      = document.getElementById('overlay');
        const titleEl        = document.getElementById('title');
        const artistEl       = document.getElementById('artist');
        const albumEl        = document.getElementById('album');
        const statusEl       = document.getElementById('status');
        const artEl          = document.getElementById('art');
        const artContainer   = document.getElementById('artContainer');
        const progressFillEl = document.getElementById('progressFill');
        const currentTimeEl  = document.getElementById('currentTime');
        const totalTimeEl    = document.getElementById('totalTime');
        const ariaStatus     = document.getElementById('ariaStatus');

        let trackStart = null, trackDuration = 0, isPlaying = false;

        function formatMs(ms) {
            if (!ms || ms < 0) return '0:00';
            const s = Math.floor(ms / 1000);
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function updateProgress() {
            if (!isPlaying || !trackStart || !trackDuration) return;
            const elapsed = Date.now() - trackStart;
            const clamped = Math.min(elapsed, trackDuration);
            progressFillEl.style.width = Math.min(100, (clamped / trackDuration) * 100) + '%';
            currentTimeEl.textContent  = formatMs(clamped);
            totalTimeEl.textContent    = formatMs(trackDuration);
        }

        async function fetchNowPlaying() {
            try {
                const r = await fetch('/nowplaying');
                if (!r.ok) return;
                const data = await r.json();

                if (!data.track) {
                    overlayEl.classList.add('hidden-state');
                    artContainer.classList.remove('spinning');
                    isPlaying = false;
                    return;
                }

                titleEl.textContent  = data.track.name   || 'Cántico Olvidado';
                artistEl.textContent = data.track.artist || 'Entidad Desconocida';
                albumEl.textContent  = data.track.album  || '';

                if (data.track.imageUrl && data.track.imageUrl !== artEl.src) {
                    artEl.src = data.track.imageUrl;
                }

                trackDuration = data.durationMs || 0;
                isPlaying = !!data.isPlaying;
                trackStart = isPlaying ? Date.now() : null;

                overlayEl.classList.remove('hidden-state');

                if (isPlaying) {
                    artContainer.classList.add('spinning');
                    statusEl.textContent = '⚡ ACTIVO';
                } else {
                    artContainer.classList.remove('spinning');
                    statusEl.textContent = '⸬ PAUSADO';
                    if (trackDuration > 0) {
                        progressFillEl.style.width = '100%';
                        currentTimeEl.textContent  = formatMs(trackDuration);
                        totalTimeEl.textContent    = formatMs(trackDuration);
                    }
                }

                ariaStatus.textContent = data.track.name + ' ' + (isPlaying ? 'sonando' : 'pausado');

            } catch(e) {
                console.error('Error nowplaying:', e);
            }
        }

        fetchNowPlaying();
        setInterval(fetchNowPlaying, POLL_INTERVAL);
        setInterval(updateProgress, 500);
    </script>
</body>
</html>
